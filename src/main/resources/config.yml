# ───────────────────────────────────────────────
#  KanbanChat 設定ファイル
# ───────────────────────────────────────────────

# enabled: ログイン時にメッセージを送るかどうか。
#          /kanbanchat on | off でも切り替えられます（その場合この値も書き換わります）。
enabled: true

# join-delay-ticks: プレイヤーが参加してから、この tick 数だけ待ってメッセージを送ります。
#                   バニラの「○○ がゲームに参加しました」等の後に表示させるための猶予です。
#                   20 tick = 1 秒。
join-delay-ticks: 30

# markers: 看板の 1 行目がこれらのいずれかと一致した場合、その看板をログイン看板として
#          自動登録します（マーカー方式）。[login:3] のように : で番号を指定できます
#          （省略時は自動採番）。マーカー行自体はメッセージには含まれません。
markers:
  - "[login]"
  - "[ログイン]"

# skip-empty-lines: 空行（何も書かれていない行）をメッセージから取り除きます。
skip-empty-lines: true

# line-separator: 1 枚の看板に書かれた複数行を 1 行に連結するときの区切り文字。
#                 看板の横幅制限（1 行 約 15 文字）で改行された文章を、チャットでは
#                 改行せず続けて表示します。看板どうしの間は常に改行で区切られます。
#                 既定の "" は区切りなし（直結。日本語向き）。英文などで語が潰れる場合は
#                 半角スペース " " を指定してください。
line-separator: ""
