name: KanbanChat
version: 1.1.0
main: io.github.astail.kanbanchat.KanbanChatPlugin
description: "指定した看板の内容を、ログインした各プレイヤーのチャットに個別表示する掲示板プラグインです（ログインした全員が対象）。"
api-version: '26.1.2'
author: astail

commands:
  kanbanchat:
    description: "ログイン看板の登録・管理を行います。"
    usage: "/kanbanchat <set|remove|list|test|reload|on|off|status>"
    aliases: [kc]
    permission: kanbanchat.admin
    permission-message: "§cこのコマンドを実行する権限がありません。"

permissions:
  kanbanchat.see:
    description: "ログイン時に看板メッセージを受け取ることを許可します。"
    default: true
  kanbanchat.admin:
    description: "/kanbanchat で看板の登録・管理を行うことを許可します。"
    default: true
  kanbanchat.manage:
    description: "/kanbanchat on|off|reload など、サーバー全体に影響する操作を許可します。"
    default: op
